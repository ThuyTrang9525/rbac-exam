apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ThuyTrang9525/rbac-exam.git
    targetRevision: main
    path: rbac

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true